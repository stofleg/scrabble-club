<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- fond dégradé sombre (style header de l'app) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1f0e"/>
      <stop offset="100%" stop-color="#1e1508"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- bordure or fine -->
  <rect x="10" y="10" width="172" height="172" rx="36" fill="none"
        stroke="#8b6914" stroke-width="2"/>
  <!-- jeton joker or, légèrement surélevé -->
  <rect x="30" y="20" width="132" height="150" rx="14" fill="#f0c040"/>
  <!-- ombre subtile sous le jeton -->
  <rect x="32" y="22" width="132" height="150" rx="14"
        fill="none" stroke="#8b6914" stroke-width="1.5" opacity="0.6"/>
  <!-- ♠ centré, noir -->
  <text x="96" y="126"
        font-family="'Arial Black','Arial',sans-serif"
        font-size="100" font-weight="900"
        text-anchor="middle"
        fill="#111318">♠</text>
  <!-- 21 en bas à droite façon jeton premium -->
  <text x="153" y="161"
        font-family="'Arial Black','Arial',sans-serif"
        font-size="22" font-weight="900"
        text-anchor="end"
        fill="#333a20">21</text>
</svg>
